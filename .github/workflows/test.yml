name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.1
      - name: Run tests
        run: zig build test

  test-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-tool
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run tests
        run: go test ./...
